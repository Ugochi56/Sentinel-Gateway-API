services:
  - type: web
    name: sentinel-gateway
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    plan: free
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: RAPIDAPI_PROXY_SECRET
        sync: false
      - key: BASE_URL
        sync: false
      - key: MAX_RETRIES
        value: "5"
      - key: WORKER_POLL_INTERVAL_SECONDS
        value: "10"
      - key: DELIVERY_TIMEOUT_SECONDS
        value: "15"
      - key: WORKER_BATCH_SIZE
        value: "10"
      - key: MAX_PAYLOAD_SIZE_BYTES
        value: "1000000"
      - key: CLEANUP_DELIVERED_AFTER_DAYS
        value: "7"
